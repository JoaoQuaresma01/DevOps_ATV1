name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  version:
    runs-on: ubuntu-latest

    steps:
      # ✅ Checkout correto (único)
      - name: Checkout do código
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      # ✅ Node
      - name: Configurar Node.js
        uses: actions/setup-node@v2
        with:
          node-version: '22'

      # ✅ Instalação
      - name: Instalar dependências
        run: npm install

      # ✅ Build
      - name: Rodar build
        run: npm run build

      # ✅ Testes
      - name: Testes unitarios
        run: npm test

      # ================================
      # 🔥 VERSIONAMENTO AUTOMÁTICO
      # ================================

      - name: Instalar semver
        run: npm install -g semver

      # ✅ Criar tag inicial se não existir
      - name: Criar tag inicial
        run: |
          if [ -z "$(git tag)" ]; then
            git config --global user.name 'github-actions'
            git config --global user.email 'github-actions@github.com'
            git tag -a v0.0.0 -m "Initial release"
            git push origin v0.0.0
          fi

      # ✅ Calcular versão
      - name: Calcular nova versão
        id: version
        run: |
          git fetch --tags

          LAST_TAG=$(git describe --tags `git rev-list --tags --max-count=1`)
          if [ -z "$LAST_TAG" ]; then
            LAST_TAG="v0.0.0"
          fi

          echo "Versão atual: $LAST_TAG"

          if [ "$LAST_TAG" = "v0.0.0" ]; then
            COMMITS=$(git log --pretty=format:"%s")
          else
            COMMITS=$(git log ${LAST_TAG}..HEAD --pretty=format:"%s")
          fi

          echo "$COMMITS"

          MAJOR=0
          MINOR=0
          PATCH=0

          echo "$COMMITS" | while read COMMIT; do
            if [[ "$COMMIT" == *"BREAKING CHANGE"* ]]; then
              MAJOR=1
            elif [[ "$COMMIT" == *"feat"* ]]; then
              MINOR=1
            elif [[ "$COMMIT" == *"fix"* ]]; then
              PATCH=1
            fi
          done

          CURRENT_VERSION=${LAST_TAG#v}
          NEW_VERSION=$CURRENT_VERSION

          if [[ $MAJOR -eq 1 ]]; then
            NEW_VERSION=$(semver -i major $CURRENT_VERSION)
          elif [[ $MINOR -eq 1 ]]; then
            NEW_VERSION=$(semver -i minor $CURRENT_VERSION)
          elif [[ $PATCH -eq 1 ]]; then
            NEW_VERSION=$(semver -i patch $CURRENT_VERSION)
          fi

          echo "Nova versão: $NEW_VERSION"
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT

      # ✅ Atualizar package.json
      - name: Atualizar versão
        run: |
          npm version ${{ steps.version.outputs.new_version }} --no-git-tag-version

      # ✅ Commit + Tag segura (não quebra se já existir)
      - name: Commit e push
        run: |
          git config --global user.name 'github-actions'
          git config --global user.email 'github-actions@github.com'

          git add package.json
          git commit -m "chore(release): version ${{ steps.version.outputs.new_version }}" || echo "Sem mudanças"

          TAG="v${{ steps.version.outputs.new_version }}"

          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag já existe, pulando..."
          else
            git tag $TAG
            git push origin $TAG
          fi

          git push origin main

      # ================================
      # 📧 EMAIL EM CASO DE FALHA
      # ================================
      - name: Enviar email em caso de falha
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.EMAIL_ORIGEN }}
          password: ${{ secrets.SENHA_EMAIL }}
          subject: "Falha no CI - Projeto DevOps_ATV1"
          body: "O processo de CI falhou na branch main. Verifique os logs no GitHub Actions."
          to: ${{ secrets.EMAIL_DESTINO }}
          from: "GitHub Actions <${{ secrets.EMAIL_ORIGEN }}>"